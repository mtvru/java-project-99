logging:
  level:
    root: WARN
    org:
      springframework:
        security: WARN

spring:
  output:
    ansi:
      enabled: always
  datasource:
    driver-class-name: org.h2.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem
